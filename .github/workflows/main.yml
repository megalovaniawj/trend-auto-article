name: 1日3回 自動トレンド記事作成

on:
schedule:
    # JSTの 8:07 (UTC 23:07) - 0分の大渋滞を回避
    - cron: '7 23 * * *'
    # JSTの 12:07 (UTC 03:07) - 0分の大渋滞を回避
    - cron: '7 3 * * *'
    # JSTの 20:07 (UTC 11:07) - 0分の大渋滞を回避
    - cron: '7 11 * * *'
  workflow_dispatch: # 手動実行用ボタンも有効化

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: ライブラリのインストール
        run: |
          pip install -r requirements.txt

      - name: 記事作成スクリプトの実行
        env:
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
