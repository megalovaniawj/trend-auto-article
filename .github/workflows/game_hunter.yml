name: Auto Game Hunter

on:
  schedule:
    # 日本時間 朝7時 (UTC 22:00) と 夕方19時 (UTC 10:00)
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch: # 手動実行ボタン（テスト用）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests

    - name: Run Hunter Script
      env:
        # パスワードだけSecretsから安全に読み込みます
        WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
      run: python auto_hunter.py
