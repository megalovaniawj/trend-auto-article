name: X Auto Post (Daily 3 times)

on:
  schedule:
    # 日本時間 08:30 (UTC 23:30)
    - cron: '30 23 * * *'
    # 日本時間 12:00 (UTC 03:00)
    - cron: '0 3 * * *'
    # 日本時間 20:30 (UTC 11:30)
    - cron: '30 11 * * *'
  
  # 手動実行ボタン
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-job:
    runs-on: ubuntu-latest

    steps:
      - name: コードを取得
        uses: actions/checkout@v3

      - name: Pythonをセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      # ★★★ ここが最重要！この記述がないと鍵が渡りません ★★★
      - name: 投稿スクリプトを実行
        env:
          X_API_KEY: ${{ 5aBdDm28LUSxuxe2puyMjYXZZ }}
          X_API_SECRET: ${{ XxsuMbrNliAKALzvSDPDWKOnwgJdvStHBbwzRydIrHOZG3w7jP }}
          X_ACCESS_TOKEN: ${{ 2020047210755547136-NFzfRgJ1Z1HYupt3qsxLHyudWuTL4A }}
          X_ACCESS_SECRET: ${{ 4Lbwjegb2ZEAL4d6aOqGfg39k140yBlgfARuoZ27UuLCX }}
        run: python x_observer.py

      - name: 投稿履歴(JSON)をGitHubに保存
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # ファイルがなければ作る
          touch x_post_history.json
          git add x_post_history.json
          # 変更があれば保存
          git commit -m "履歴更新" || echo "変更なし"
          git push
