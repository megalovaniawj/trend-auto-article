name: Docchiyo Debate Hunter V73

# 実行タイミングの設定
on:
  schedule:
    # ★最重要：main.py（0分起動）とのAPI衝突を避けるための「15分ずらし」設定
    # 日本時間の 朝6:15, 昼12:15, 夕方18:15, 夜22:15 に実行
    - cron: '15 21,3,9,13 * * *'
  # 手動で「Run workflow」ボタンを押せるようにするおまじない
  workflow_dispatch: 

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      # V73用に最適化（REST API方式になったため google-generativeai は削除し軽量化）
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser pytz

    - name: Run Debate Hunter Script
      # GitHubのSecretsに登録した鍵をPythonに渡す
      env:
        WP_URL: ${{ secrets.WP_URL }}
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      # 実行するPythonファイル名（ファイル名が違う場合は書き換えてください）
      run: python debate_hunter.py
