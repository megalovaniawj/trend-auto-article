name: Debate Hunter

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間 朝6時
    - cron: '0 9 * * *'  # 日本時間 夕18時
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # duckduckgo-searchなどを追加
        pip install feedparser requests duckduckgo-search

    - name: Run Debate Script
      env:
        # ★ここでSecretsをPythonに渡します（これが抜けているとエラーになります）
        WP_URL: ${{ secrets.WP_URL }} # もし設定していれば
        WP_USER: ${{ secrets.WP_USER }} # もし設定していれば
        WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
      run: python debate_hunter.py
