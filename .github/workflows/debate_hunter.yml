name: Debate Hunter

on:
  schedule:
    # 日本時間 朝6時 (UTC 21:00)
    - cron: '0 21 * * *'
    # 日本時間 夕方18時 (UTC 09:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests

    - name: Run Debate Script
      env:
        # 共通のSecrets（パスワード）を使います
        WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
      # ▼ここで新しいファイル(debate_hunter.py)を実行します
      run: python debate_hunter.py
